<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSL Calendar Layout Mockup</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --holiday-red: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif !important;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: var(--card-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.25rem;
            flex-shrink: 0;
            z-index: 100;
        }

        .sidebar h1 {
            font-size: 1.4rem;
            color: var(--primary-color);
            margin-bottom: 2.5rem;
            font-weight: 800;
            padding-left: 0.5rem;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
        }

        .btn {
            padding: 0.7rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid transparent;
            background: transparent;
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #f1f5f9;
            color: var(--primary-color);
        }

        .btn.active {
            background: #eef2ff;
            color: var(--primary-color);
            font-weight: 600;
        }

        .btn-logout {
            margin-top: auto;
            color: #ef4444;
        }

        .btn-logout:hover {
            background: #fef2f2;
        }

        /* MAIN CONTENT AREA */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        /* STATIC TOP HEADER (New Design) */
        .static-header {
            height: 70px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            flex-shrink: 0;
            z-index: 50;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            padding: 0.25rem;
            border-radius: 0.75rem;
            gap: 0.25rem;
        }

        .nav-btn {
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-main);
        }

        .nav-btn:hover { background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .current-date {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .header-center {
            flex: 0 1 400px;
            position: relative;
        }

        .search-bar {
            width: 100%;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border-color);
            background: #f8fafc;
            font-size: 0.9rem;
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .view-toggles {
            display: flex;
            background: #f1f5f9;
            padding: 0.25rem;
            border-radius: 0.75rem;
        }

        .view-btn {
            padding: 0.4rem 1rem;
            border-radius: 0.5rem;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .view-btn.active { background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .icon-btn {
            padding: 0.5rem;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            color: var(--text-muted);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding-left: 1rem;
            border-left: 1px solid var(--border-color);
        }

        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #eef2ff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--primary-color);
            overflow: hidden;
        }

        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* SCROLLABLE CALENDAR AREA */
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .calendar-grid {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            min-height: 1200px;
            padding: 2rem;
        }
    </style>
</head>
<body>

    <!-- FIXED SIDEBAR -->
    <aside class="sidebar">
        <h1>RSL Calendar</h1>
        
        <nav class="nav-links">
            <a href="#" class="btn active">Calendar</a>
            <a href="#" class="btn">Holidays</a>
            <a href="#" class="btn">Meetings</a>
            <a href="#" class="btn">Attendance</a>
            <a href="#" class="btn">Admin View</a>
            
            <a href="#" class="btn btn-logout">Logout</a>
        </nav>
    </aside>

    <!-- MAIN CONTAINER -->
    <div class="main-container">
        
        <!-- STATIC TOP HEADER (Redesigned) -->
        <header class="static-header">
            <div class="header-left">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <button class="btn" style="padding: 0.5rem 1rem; font-size: 0.9rem; font-weight: 700;">Prev</button>
                    <div class="current-date">May 2026</div>
                    <button class="btn" style="padding: 0.5rem 1rem; font-size: 0.9rem; font-weight: 700;">Next</button>
                </div>
            </div>


            <div class="header-center">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-bar" placeholder="Search events...">
            </div>

            <div class="header-right">
                <div class="view-toggles">
                    <button class="view-btn active">Month</button>
                    <button class="view-btn">Week</button>
                </div>
                
                <div class="user-profile">

                    <div style="text-align: right;">
                        <div style="font-weight: 700; font-size: 0.9rem;">Pratik Pawane</div>
                        <div style="font-size: 0.7rem; color: var(--text-muted);">Admin</div>
                    </div>
                    <div class="avatar">
                        <img src="https://ui-avatars.com/api/?name=Pratik+Pawane&background=6366f1&color=fff" alt="User">
                    </div>
                </div>
            </div>
        </header>

        <!-- SCROLLABLE CONTENT -->
        <div class="scrollable-content">
            <div class="calendar-grid">
                <h3 style="color: var(--text-muted);">Calendar Grid Content...</h3>
            </div>
        </div>

    </div>

</body>
</html>
