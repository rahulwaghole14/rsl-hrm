<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading — RSL TeamHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── Fullscreen Loader ── */
        .loader-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        /* ── Subtle background pattern ── */
        .loader-overlay::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse 600px 400px at 30% 20%, rgba(99, 102, 241, 0.06), transparent),
                radial-gradient(ellipse 500px 350px at 70% 80%, rgba(139, 92, 246, 0.05), transparent);
            pointer-events: none;
        }

        /* ── Orbital Ring Container ── */
        .loader-orb-wrap {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 2rem;
        }

        .loader-orb-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2.5px solid transparent;
        }

        .loader-orb-ring:nth-child(1) {
            border-top-color: #6366f1;
            border-right-color: rgba(99, 102, 241, 0.3);
            animation: orbitSpin 1.2s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite;
        }

        .loader-orb-ring:nth-child(2) {
            inset: 10px;
            border-top-color: #8b5cf6;
            border-left-color: rgba(139, 92, 246, 0.3);
            animation: orbitSpin 1.8s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite reverse;
        }

        .loader-orb-ring:nth-child(3) {
            inset: 20px;
            border-bottom-color: #a78bfa;
            border-right-color: rgba(167, 139, 250, 0.3);
            animation: orbitSpin 2.5s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite;
        }

        /* ── Center Orb ── */
        .loader-orb-center {
            position: absolute;
            inset: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 0 30px rgba(99, 102, 241, 0.3),
                0 0 60px rgba(139, 92, 246, 0.12),
                inset 0 -2px 6px rgba(0, 0, 0, 0.1);
            animation: pulseGlow 2.2s ease-in-out infinite;
        }

        .loader-orb-center svg {
            width: 20px;
            height: 20px;
            color: white;
            filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.15));
        }

        @keyframes orbitSpin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulseGlow {
            0%, 100% {
                box-shadow: 
                    0 0 30px rgba(99, 102, 241, 0.3),
                    0 0 60px rgba(139, 92, 246, 0.12);
                transform: scale(1);
            }
            50% {
                box-shadow: 
                    0 0 40px rgba(99, 102, 241, 0.45),
                    0 0 80px rgba(139, 92, 246, 0.2);
                transform: scale(1.06);
            }
        }

        /* ── Brand Name ── */
        .loader-brand {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4f46e5, #7c3aed, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
            margin-bottom: 0.6rem;
            position: relative;
            z-index: 1;
        }

        /* ── Status Text with Dot Pulse ── */
        .loader-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.88rem;
            font-weight: 500;
            color: #94a3b8;
            letter-spacing: 0.2px;
            position: relative;
            z-index: 1;
        }

        .loader-dot-pulse {
            display: flex;
            gap: 3px;
            align-items: center;
        }

        .loader-dot-pulse span {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #6366f1;
            animation: dotBounce 1.4s ease-in-out infinite;
        }

        .loader-dot-pulse span:nth-child(2) { animation-delay: 0.16s; }
        .loader-dot-pulse span:nth-child(3) { animation-delay: 0.32s; }

        @keyframes dotBounce {
            0%, 80%, 100% { opacity: 0.25; transform: scale(0.8); }
            40%            { opacity: 1;    transform: scale(1.3); }
        }

        /* ── Progress Shimmer Bar ── */
        .loader-progress-track {
            width: 200px;
            height: 3px;
            background: rgba(99, 102, 241, 0.08);
            border-radius: 100px;
            overflow: hidden;
            margin-top: 1.8rem;
            position: relative;
            z-index: 1;
        }

        .loader-progress-bar {
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #8b5cf6, #c4b5fd, #8b5cf6, #6366f1);
            background-size: 200% 100%;
            border-radius: 100px;
            animation: shimmer 1.6s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%   { transform: translateX(-100%); background-position: 0% 0%; }
            50%  { background-position: 100% 0%; }
            100% { transform: translateX(350%);  background-position: 0% 0%; }
        }
    </style>
</head>
<body>
    <div class="loader-overlay">
        <!-- Orbital Rings -->
        <div class="loader-orb-wrap">
            <div class="loader-orb-ring"></div>
            <div class="loader-orb-ring"></div>
            <div class="loader-orb-ring"></div>
            <div class="loader-orb-center">
                <!-- Lightning bolt icon -->
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </div>
        </div>

        <!-- Brand -->
        <div class="loader-brand">RSL Jeevansathi</div>

        <!-- Status -->
        <div class="loader-status">
            Loading
            <div class="loader-dot-pulse">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- Progress -->
        <div class="loader-progress-track">
            <div class="loader-progress-bar"></div>
        </div>
    </div>
</body>
</html>
