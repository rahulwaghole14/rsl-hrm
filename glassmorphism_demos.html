<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Month Picker Sample</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            /* Colorful background to show off the glass effect */
            background: linear-gradient(135deg, #c2e59c 0%, #64b3f4 100%);
            background-image: 
                radial-gradient(at 40% 20%, rgba(132, 94, 236, 0.6) 0px, transparent 50%),
                radial-gradient(at 80% 0%, rgba(220, 38, 38, 0.5) 0px, transparent 50%),
                radial-gradient(at 0% 50%, rgba(16, 185, 129, 0.4) 0px, transparent 50%),
                radial-gradient(at 80% 50%, rgba(245, 158, 11, 0.5) 0px, transparent 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            box-sizing: border-box;
        }

        /* Glassmorphism Month Picker */
        .month-picker-dropdown {
            /* Glassmorphism styles */
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 0.75rem; /* slightly smaller radius */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1), 0 1px 3px rgba(0,0,0,0.05);
            
            /* Sizing and Layout */
            width: 260px; /* Reduced from 320px */
            padding: 0.5rem; /* Reduced padding */
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.25rem; /* Reduced gap */
        }

        .month-option {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.25rem;
            color: #0f172a;
            text-decoration: none;
            font-size: 0.8rem; /* Reduced font size */
            font-weight: 500;
            border-radius: 0.4rem;
            transition: all 0.2s;
            border: 1px solid transparent;
            height: 32px; /* Reduced height */
            cursor: pointer;
        }

        .month-option:hover {
            background: rgba(255, 255, 255, 0.4);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .month-option.active {
            background: #6366f1; /* The purple from the screenshot */
            color: white;
            border-color: #6366f1;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

    </style>
</head>
<body>

    <!-- The exact component from the screenshot, styled with glassmorphism -->
    <div class="month-picker-dropdown">
        <div class="month-option">January</div>
        <div class="month-option">February</div>
        <div class="month-option">March</div>
        <div class="month-option">April</div>
        <div class="month-option active">May</div>
        <div class="month-option">June</div>
        <div class="month-option">July</div>
        <div class="month-option">August</div>
        <div class="month-option">September</div>
        <div class="month-option">October</div>
        <div class="month-option">November</div>
        <div class="month-option">December</div>
    </div>

</body>
</html>
